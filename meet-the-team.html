<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Meet the Team | AUB OSB Executive Education</title>
    <meta name="robots" content="noindex, nofollow" />

    <!-- Google Fonts + Lucide + AOS -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700;800&display=swap" rel="stylesheet" />
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://unpkg.com/aos@next/dist/aos.js"></script>

    <!-- Main Styles (shared with index) -->
    <link rel="stylesheet" href="css/main.css" />

    <style>
        /* Additional styles for team page – uses CSS variables from main.css */
        .team-hero {
            background: var(--color-primary);
            color: white;
            text-align: center;
            padding: 4rem 1.5rem;
            margin-bottom: 2rem;
        }

        .team-hero h1 {
            font-size: 3rem;
            margin-bottom: 0.5rem;
        }

        .team-hero p {
            font-size: 1.2rem;
            opacity: 0.9;
        }

        .team-category {
            margin-bottom: 3rem;
        }

        /* Card layout: image circular, left of text */
        .team-card {
            display: flex;
            flex-wrap: wrap;
            gap: 1.5rem;
            background: #fff;
            border-radius: 16px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.08), 0 8px 10px -6px rgba(0, 0, 0, 0.02);
            padding: 1.5rem;
            margin-bottom: 1.5rem;
            transition: transform 0.25s ease, box-shadow 0.25s ease;
        }

        .team-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 20px 30px -12px rgba(0, 0, 0, 0.15);
        }

        .team-card__image {
            flex-shrink: 0;
            width: 120px;
            height: 120px;
        }

        .team-card__image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 50%;
            transition: transform 0.3s;
        }

        .team-card:hover .team-card__image img {
            transform: scale(1.02);
        }

        .team-card__content {
            flex: 1;
        }

        .team-card__name {
            font-size: 1.4rem;
            font-weight: 800;
            color: #1e293b;
            margin-bottom: 0.25rem;
        }

        .team-card__name a {
            color: inherit;
            text-decoration: none;
            transition: color 0.2s;
        }

        .team-card__name a:hover {
            color: var(--color-primary);
            text-decoration: underline;
        }

        .team-card__title {
            font-size: 0.9rem;
            font-weight: 600;
            color: var(--color-primary);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 0.75rem;
        }

        .team-card__bio {
            font-size: 0.95rem;
            line-height: 1.5;
            color: #475569;
            margin-bottom: 1rem;
        }

        .team-card__email {
            font-size: 0.85rem;
        }

        .team-card__email a {
            color: var(--color-primary);
            text-decoration: none;
            font-weight: 500;
        }

        .team-card__email a:hover {
            text-decoration: underline;
        }

        .container {
            max-width: 1280px;
            margin: 0 auto;
            padding: 0 1.5rem;
        }

        @media (max-width: 768px) {
            .container {
                padding: 0 1rem;
            }

            .team-card {
                flex-direction: column;
                align-items: center;
                text-align: center;
            }

            .team-card__image {
                width: 100px;
                height: 100px;
                margin-bottom: 0.5rem;
            }

            .team-hero h1 {
                font-size: 2.2rem;
            }
        }

        /* Simple grid for multiple cards in a category */
        .team-grid {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }
    </style>
</head>

        // Function to render the entire team section
        function renderTeam() {
            const container = document.getElementById('team-container');
            container.innerHTML = '';
            for (const [category, members] of Object.entries(teamData)) {
                const categoryDiv = document.createElement('div');
                categoryDiv.className = 'team-category';
                categoryDiv.setAttribute('data-aos', 'fade-up');
                const heading = document.createElement('h2');
                heading.textContent = category;
                heading.className = 'section-title';
                categoryDiv.appendChild(heading);
                const gridDiv = document.createElement('div');
                gridDiv.className = 'team-grid';
                members.forEach(member => {
                    const card = document.createElement('div');
                    card.className = 'team-card';
                    // Image section
                    const imgDiv = document.createElement('div');
                    imgDiv.className = 'team-card__image';
                    const img = document.createElement('img');
                    img.src = member.image;
                    img.alt = member.name;
                    img.loading = 'lazy';
                    // Fallback if image missing
                    img.onerror = function () { this.src = 'https://via.placeholder.com/120?text=Photo'; };
                    imgDiv.appendChild(img);
                    // Content section
                    const contentDiv = document.createElement('div');
                    contentDiv.className = 'team-card__content';
                    const nameDiv = document.createElement('div');
                    nameDiv.className = 'team-card__name';
                    const nameLink = document.createElement('a');
                    nameLink.href = member.profileUrl;
                    nameLink.textContent = member.name;
                    nameDiv.appendChild(nameLink);
                    const titleDiv = document.createElement('div');
                    titleDiv.className = 'team-card__title';
                    titleDiv.textContent = member.title;
                    const bioDiv = document.createElement('div');
                    bioDiv.className = 'team-card__bio';
                    bioDiv.textContent = member.bio;
                    const emailDiv = document.createElement('div');
                    emailDiv.className = 'team-card__email';
                    const emailLink = document.createElement('a');
                    emailLink.href = `mailto:${member.email}`;
                    emailLink.textContent = member.email;
                    emailDiv.appendChild(emailLink);
                    contentDiv.appendChild(nameDiv);
                    contentDiv.appendChild(titleDiv);
                    contentDiv.appendChild(bioDiv);
                    contentDiv.appendChild(emailDiv);
                    card.appendChild(imgDiv);
                    card.appendChild(contentDiv);
                    gridDiv.appendChild(card);
                });
                categoryDiv.appendChild(gridDiv);
                container.appendChild(categoryDiv);
            }
            // Reinitialize AOS for new content
            AOS.refresh();
        }

        // Initialize page
        document.addEventListener('DOMContentLoaded', () => {
            renderTeam();
            AOS.init({ duration: 800, once: true });
            lucide.createIcons();
        });

</html>
